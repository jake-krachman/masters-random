<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Random Masters Vault Clip</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Georgia', serif;
      background: #0a3d0a;
      color: #fff;
      overflow-x: hidden;
    }

    .bg {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 30% 20%, rgba(255,215,0,0.06) 0%, transparent 60%),
        radial-gradient(ellipse at 70% 80%, rgba(0,60,0,0.4) 0%, transparent 60%),
        #0a3d0a;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 560px;
      padding: 40px 24px;
    }

    h1 {
      font-size: 14px;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: #d4af37;
      margin-bottom: 8px;
      font-weight: 400;
    }

    .year {
      font-size: 72px;
      font-weight: 700;
      color: #fff;
      line-height: 1;
      margin-bottom: 32px;
      text-shadow: 0 2px 20px rgba(0,0,0,0.3);
    }

    /* ---- Range slider ---- */
    .range-filter {
      margin-bottom: 28px;
      padding: 0 4px;
      user-select: none;
    }

    .range-labels {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: #d4af37;
      margin-bottom: 10px;
      font-variant-numeric: tabular-nums;
    }

    .range-track-wrapper {
      position: relative;
      height: 36px;
      cursor: pointer;
      touch-action: none;
    }

    .range-track {
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 4px;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.12);
      border-radius: 2px;
    }

    .range-fill {
      position: absolute;
      top: 50%;
      height: 4px;
      transform: translateY(-50%);
      background: #d4af37;
      border-radius: 2px;
      pointer-events: none;
    }

    .range-thumb {
      position: absolute;
      top: 50%;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #d4af37;
      border: 2px solid #0a3d0a;
      transform: translate(-50%, -50%);
      cursor: grab;
      z-index: 2;
      transition: box-shadow 0.15s;
    }

    .range-thumb:hover, .range-thumb.active {
      box-shadow: 0 0 0 6px rgba(212,175,55,0.2);
    }

    .range-thumb.active {
      cursor: grabbing;
    }

    .range-clip-count {
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      margin-top: 6px;
      letter-spacing: 0.5px;
    }

    /* ---- Card ---- */
    .card {
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(212,175,55,0.2);
      border-radius: 12px;
      padding: 32px 28px;
      margin-bottom: 28px;
      text-align: left;
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    .card.fade-out {
      opacity: 0;
      transform: translateY(8px);
    }

    .clip-title {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      line-height: 1.3;
      margin-bottom: 8px;
    }

    .clip-subtitle {
      font-size: 14px;
      color: rgba(255,255,255,0.55);
      margin-bottom: 16px;
    }

    .meta {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .meta-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .meta-label {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(212,175,55,0.7);
    }

    .meta-value {
      font-size: 15px;
      color: rgba(255,255,255,0.85);
      font-family: 'Georgia', serif;
    }

    .moment-badge {
      display: inline-block;
      background: rgba(212,175,55,0.15);
      border: 1px solid rgba(212,175,55,0.3);
      color: #d4af37;
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 4px;
      margin-top: 14px;
    }

    .buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 28px;
      border-radius: 8px;
      font-family: 'Georgia', serif;
      font-size: 15px;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.2s ease;
      border: none;
    }

    .btn-primary {
      background: #d4af37;
      color: #0a3d0a;
      font-weight: 700;
    }
    .btn-primary:hover {
      background: #e6c44d;
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(212,175,55,0.3);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.8);
      border: 1px solid rgba(255,255,255,0.15);
    }
    .btn-secondary:hover {
      background: rgba(255,255,255,0.12);
      color: #fff;
    }

    .counter {
      margin-top: 24px;
      font-size: 12px;
      color: rgba(255,255,255,0.3);
      letter-spacing: 1px;
    }

    .shuffle-counter {
      margin-top: 28px;
      font-size: 12px;
      color: rgba(255,255,255,0.25);
      letter-spacing: 1px;
      font-variant-numeric: tabular-nums;
    }

    .footer {
      margin-top: 32px;
      font-size: 11px;
      color: rgba(255,255,255,0.3);
      line-height: 1.7;
    }

    .footer a {
      color: rgba(212,175,55,0.5);
      text-decoration: none;
    }

    .footer a:hover {
      color: #d4af37;
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="container">
    <h1>The Masters Vault</h1>
    <div class="year" id="year">&mdash;</div>

    <div class="range-filter">
      <div class="range-labels">
        <span id="range-lo-label">1968</span>
        <span id="range-hi-label">2025</span>
      </div>
      <div class="range-track-wrapper" id="track-wrapper">
        <div class="range-track"></div>
        <div class="range-fill" id="range-fill"></div>
        <div class="range-thumb" id="thumb-lo"></div>
        <div class="range-thumb" id="thumb-hi"></div>
      </div>
      <div class="range-clip-count" id="range-clip-count"></div>
    </div>

    <div class="card" id="card">
      <div class="clip-title" id="title">Loading...</div>
      <div class="clip-subtitle" id="subtitle"></div>
      <div class="meta">
        <div class="meta-item">
          <span class="meta-label">Player</span>
          <span class="meta-value" id="player">&mdash;</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">Round</span>
          <span class="meta-value" id="round">&mdash;</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">Timecode</span>
          <span class="meta-value" id="timecode">&mdash;</span>
        </div>
      </div>
      <div id="moment-container"></div>
    </div>

    <div class="buttons">
      <a class="btn btn-primary" id="watch-btn" href="#" target="_blank" rel="noopener">
        Watch Clip &rarr;
      </a>
      <button class="btn btn-secondary" id="shuffle-btn" onclick="shuffle()">
        Shuffle
      </button>
    </div>

    <div class="counter" id="counter"></div>

    <div class="shuffle-counter" id="shuffle-counter"></div>

    <div class="footer">
      You must be logged in at <a href="https://www.masters.com" target="_blank" rel="noopener">masters.com</a> to watch clips.<br>
      This site is not affiliated with or endorsed by Augusta National Golf Club or the Masters Tournament.<br>
      <a href="https://github.com/jake-krachman/masters-random" target="_blank" rel="noopener">View on GitHub</a>
    </div>
  </div>

  <script>
    let allClips = [];
    let filtered = [];
    let current = null;
    let years = [];
    let loIdx = 0;
    let hiIdx = 0;
    let activeThumb = null;
    let totalShuffles = 0;

    function updateShuffleCounter(count) {
      totalShuffles = count;
      document.getElementById('shuffle-counter').textContent =
        count.toLocaleString() + ' clips shuffled';
    }

    // Load current count on page load
    fetch('https://api.counterapi.dev/v1/masters-random/shuffles')
      .then(r => r.json())
      .then(d => { if (d.count) updateShuffleCounter(d.count); })
      .catch(() => {});

    function bumpShuffleCount() {
      fetch('https://api.counterapi.dev/v1/masters-random/shuffles/up')
        .then(r => r.json())
        .then(d => { if (d.count) updateShuffleCounter(d.count); })
        .catch(() => { updateShuffleCounter(++totalShuffles); });
    }

    const trackWrapper = document.getElementById('track-wrapper');
    const thumbLo = document.getElementById('thumb-lo');
    const thumbHi = document.getElementById('thumb-hi');
    const rangeFill = document.getElementById('range-fill');
    const loLabel = document.getElementById('range-lo-label');
    const hiLabel = document.getElementById('range-hi-label');
    const clipCount = document.getElementById('range-clip-count');

    function pctForIdx(i) {
      if (years.length <= 1) return 0;
      return (i / (years.length - 1)) * 100;
    }

    function idxFromPct(pct) {
      return Math.round(pct / 100 * (years.length - 1));
    }

    function pctFromEvent(e) {
      const rect = trackWrapper.getBoundingClientRect();
      const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
      return Math.max(0, Math.min(100, x / rect.width * 100));
    }

    function updateSliderUI() {
      const loPct = pctForIdx(loIdx);
      const hiPct = pctForIdx(hiIdx);
      thumbLo.style.left = loPct + '%';
      thumbHi.style.left = hiPct + '%';
      rangeFill.style.left = loPct + '%';
      rangeFill.style.width = (hiPct - loPct) + '%';
      loLabel.textContent = years[loIdx];
      hiLabel.textContent = years[hiIdx];
    }

    function applyFilter() {
      const lo = parseInt(years[loIdx]);
      const hi = parseInt(years[hiIdx]);
      filtered = allClips.filter(c => {
        const y = parseInt(c.video_year);
        return y >= lo && y <= hi;
      });
      current = null;
      const rangeText = lo === hi ? `${lo}` : `${lo}\u2013${hi}`;
      clipCount.textContent = `${filtered.length.toLocaleString()} clips in range`;
    }

    function onPointerDown(e) {
      e.preventDefault();
      const pct = pctFromEvent(e);
      const loPct = pctForIdx(loIdx);
      const hiPct = pctForIdx(hiIdx);
      // pick nearest thumb
      if (Math.abs(pct - loPct) <= Math.abs(pct - hiPct)) {
        activeThumb = 'lo';
        thumbLo.classList.add('active');
      } else {
        activeThumb = 'hi';
        thumbHi.classList.add('active');
      }
      onPointerMove(e);
    }

    function onPointerMove(e) {
      if (!activeThumb) return;
      e.preventDefault();
      const pct = pctFromEvent(e);
      const idx = idxFromPct(pct);
      if (activeThumb === 'lo') {
        loIdx = Math.min(idx, hiIdx);
      } else {
        hiIdx = Math.max(idx, loIdx);
      }
      updateSliderUI();
    }

    function onPointerUp() {
      if (!activeThumb) return;
      thumbLo.classList.remove('active');
      thumbHi.classList.remove('active');
      activeThumb = null;
      applyFilter();
      shuffle();
    }

    trackWrapper.addEventListener('mousedown', onPointerDown);
    trackWrapper.addEventListener('touchstart', onPointerDown, { passive: false });
    document.addEventListener('mousemove', onPointerMove);
    document.addEventListener('touchmove', onPointerMove, { passive: false });
    document.addEventListener('mouseup', onPointerUp);
    document.addEventListener('touchend', onPointerUp);

    function buildUrl(clip) {
      const match = clip.cmsid.match(/masters_v1_(\d+)_en/);
      const cmsNumber = match ? match[1] : clip.cmsid;
      const start = clip.scenesummarizationstarttime;
      const year = clip.video_year;
      return `https://www.masters.com/en_US/watch/2024-03-27/${cmsNumber}/${year}_masters_final_round.html?t=${start}&subType=video_vault`;
    }

    function formatRound(r) {
      if (!r) return '\u2014';
      const num = r.replace(/\D/g, '');
      return num ? `Round ${num}` : r;
    }

    function shuffle() {
      if (!filtered.length) return;
      const card = document.getElementById('card');
      card.classList.add('fade-out');

      setTimeout(() => {
        let next;
        do { next = filtered[Math.floor(Math.random() * filtered.length)]; }
        while (filtered.length > 1 && next === current);
        current = next;

        document.getElementById('year').textContent = next.video_year;
        document.getElementById('title').textContent = next.clip_title;
        document.getElementById('subtitle').textContent = next.clip_subtitle;
        document.getElementById('player').textContent = next.full_name || '\u2014';
        document.getElementById('round').textContent = formatRound(next.round_number);
        document.getElementById('timecode').textContent = next.timecode?.split('.')[0] || '\u2014';
        document.getElementById('watch-btn').href = buildUrl(next);

        const mc = document.getElementById('moment-container');
        mc.innerHTML = next.is_moment
          ? '<span class="moment-badge">Key Moment</span>'
          : '';

        const lo = years[loIdx], hi = years[hiIdx];
        const rangeText = lo === hi ? lo : `${lo}\u2013${hi}`;
        document.getElementById('counter').textContent =
          `${filtered.length.toLocaleString()} clips \u2022 ${rangeText}`;

        bumpShuffleCount();
        card.classList.remove('fade-out');
      }, 300);
    }

    fetch('all_clips.json')
      .then(r => r.json())
      .then(data => {
        allClips = data;
        filtered = data;
        years = [...new Set(data.map(c => c.video_year))].sort();
        loIdx = 0;
        hiIdx = years.length - 1;
        updateSliderUI();
        clipCount.textContent = `${data.length.toLocaleString()} clips in range`;
        shuffle();
      })
      .catch(() => {
        document.getElementById('title').textContent = 'Failed to load clips';
      });
  </script>
</body>
</html>
